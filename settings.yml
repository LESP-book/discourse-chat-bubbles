light_bubble_color_1:
  default: "#ddf9d3"
  type: string
  description: Chat bubble color for you, used in the the light scheme.
light_bubble_color_2:
  default: "#FFFFFF"
  type: string
  description: Chat bubble color for others, used in the light scheme.
dark_bubble_color_1:
  default: "#215046"
  type: string
  description: Chat bubble color for you, used in the the dark scheme.
dark_bubble_color_2:
  default: "#363638"
  type: string
  description: Chat bubble color for others, used in the dark scheme.
light_background_color:
  default: "#fff8eb"
  type: string
  description: Background color for the chat window.
dark_background_color:
  default: "#0F1216"
  type: string
  description: Background color for the chat window.
enable_pattern:
  default: true
  type: bool
  description: Enable background pattern for the chat window.
background_pattern:
  default: ""
  type: upload
  description: Background pattern for the chat window, works best with SVGs. If you want to use an image instead, make sure it's optimised for mobile device viewport.
enable_read_receipts:
  default: true
  type: bool
  description: Show read avatars and read times for your chat messages.
read_receipt_max_avatars:
  default: 3
  min: 1
  max: 8
  type: integer
  description: Maximum number of read avatars shown in the compact read receipt trigger.
read_receipt_refresh_interval_seconds:
  default: 3
  type: integer
  description: Seconds between read receipt refreshes.
